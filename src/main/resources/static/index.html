<!DOCTYPE html>
<html>
<head>
    <title>Waste Food Redistribution</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Food Donation</h2>

    <form id="donationForm">
        <input type="text" id="foodName" placeholder="Food Name" required>
        <input type="number" id="quantity" placeholder="Quantity" required>
        <input type="text" id="location" placeholder="Location" required>
        <input type="text" id="expiryTime" placeholder="Expiry Time" required>

        <button type="submit">Add Donation</button>
    </form>

    <h2>Available Donations</h2>

    <table>
        <thead>
        <tr>
            <th>Food</th>
            <th>Qty</th>
            <th>Location</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="donationTable"></tbody>
    </table>
</div>

<script>

    function loadDonations() {
        fetch("/donations/all")
            .then(res => res.json())
            .then(data => {
                let table = "";
                data.forEach(d => {
                    table += `
                <tr>
                    <td>${d.foodName}</td>
                    <td>${d.quantity}</td>
                    <td>${d.location}</td>
                    <td>${d.status}</td>
                    <td>
                        <button onclick="acceptDonation(${d.id})">
                            Accept
                        </button>
                    </td>
                </tr>
            `;
                });
                document.getElementById("donationTable").innerHTML = table;
            });
    }

    document.getElementById("donationForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const data = {
            foodName: document.getElementById("foodName").value,
            quantity: document.getElementById("quantity").value,
            location: document.getElementById("location").value,
            expiryTime: document.getElementById("expiryTime").value
        };

        fetch("/donations/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
            .then(() => {
                document.getElementById("donationForm").reset();
                loadDonations();
            });
    });

    function acceptDonation(id) {
        fetch(`/donations/accept/${id}`, {
            method: "PUT"
        }).then(() => loadDonations());
    }

    loadDonations();

</script>

</body>
</html>
